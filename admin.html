<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimplyDoors | Pricing Admin Dashboard</title>
    <style>
        :root {
            --brand-bg: #0f172a; --brand-panel: #1e293b;
            --brand-primary: #059669; --brand-accent: #10b981;
            --text-main: #f8fafc; --text-muted: #94a3b8;
            --border-color: #334155; --danger: #ef4444;
        }

        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--brand-bg); color: var(--text-main); margin: 0; padding: 20px; line-height: 1.6; }
        .container { max-width: 1400px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--brand-primary); padding-bottom: 20px; margin-bottom: 30px; }
        h1 { margin: 0; font-size: 1.8rem; font-weight: 800; }
        h1 span { color: var(--brand-accent); }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }

        .panel { background: var(--brand-panel); border: 1px solid var(--border-color); border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; margin-bottom: 20px; }
        .panel-header { background: rgba(0,0,0,0.2); padding: 15px 20px; font-weight: 700; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .control-group { padding: 15px 20px; border-bottom: 1px solid var(--border-color); }
        .control-group label { display: block; font-size: 0.85rem; font-weight: 700; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
        
        select, input[type="password"], input[type="text"] { width: 100%; padding: 10px; background: var(--brand-bg); color: var(--text-main); border: 1px solid var(--border-color); border-radius: 6px; font-size: 1rem; outline: none; }
        select:focus, input:focus { border-color: var(--brand-primary); }

        textarea { width: 100%; height: 350px; background: var(--brand-bg); color: var(--text-main); border: none; padding: 20px; font-family: monospace; font-size: 0.9rem; resize: vertical; outline: none; white-space: pre; overflow-wrap: normal; overflow-x: auto; }
        textarea:focus { box-shadow: inset 0 0 0 2px var(--brand-primary); }

        pre { margin: 0; padding: 20px; height: 350px; background: var(--brand-bg); color: #a7f3d0; font-family: monospace; font-size: 0.85rem; overflow: auto; }

        .btn-primary { background: var(--brand-primary); color: white; border: none; padding: 12px 20px; border-radius: 6px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.2s; width: 100%; text-transform: uppercase;}
        .btn-primary:hover { background: var(--brand-accent); }
        .btn-primary:disabled { background: var(--border-color); color: var(--text-muted); cursor: not-allowed; }

        .status-box { padding: 15px; margin: 20px; border-radius: 6px; display: none; font-weight: bold; text-align: center; }
        .status-success { background: #dcfce7; color: #065f46; border: 1px solid #34d399; display: block; }
        .status-error { background: #fee2e2; color: #991b1b; border: 1px solid #f87171; display: block; }
        .status-loading { background: #fef08a; color: #854d0e; border: 1px solid #facc15; display: block; }

    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Simply<span>Doors</span> | Pricing Admin Dashboard</h1>
        </header>

        <div class="grid">
            <div class="panel">
                <div class="panel-header"><span>1. Excel Input</span></div>
                <div class="control-group">
                    <label>Select Category to Update</label>
                    <select id="dataType" onchange="convertData()">
                        <option value="slabs">Door Slab Pricing [pricingDB] (8 Columns)</option>
                        <option value="adders">Production Adders & Services (2 Columns)</option>
                        <option value="trim">Trim Pricing (3 Columns)</option>
                    </select>
                </div>
                <textarea id="excelInput" placeholder="Paste your Excel columns here (exclude header row)..." oninput="convertData()"></textarea>
            </div>

            <div>
                <div class="panel">
                    <div class="panel-header"><span>2. GitHub Authentication</span></div>
                    <div class="control-group">
                        <label>Personal Access Token (PAT)</label>
                        <input type="password" id="githubToken" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
                        <div style="font-size: 0.8rem; color: var(--text-muted); margin-top: 5px;">*Token is strictly stored in your browser session. Never share this key.</div>
                    </div>
                </div>

                <div class="panel">
                    <div class="panel-header"><span>3. Review & Deploy</span></div>
                    <pre id="jsonOutput">// Parsed preview will appear here...</pre>
                    <div class="control-group" style="border: none;">
                        <button class="btn-primary" id="pushBtn" onclick="pushToGitHub()">Push Update to Live Server</button>
                    </div>
                </div>

                <div id="statusMessage" class="status-box"></div>
            </div>
        </div>
    </div>

    <script>
        // Configuration
        const REPO_OWNER = "SimplyDoorsAA";
        const REPO_NAME = "SD-Interior-Door-Configurator-";
        const FILE_PATH = "data/pricing.json";

        let currentParsedData = null;

        // Base64 Encoding Helper (Handles special characters safely)
        function encodeBase64(str) {
            return btoa(unescape(encodeURIComponent(str)));
        }

        function decodeBase64(str) {
            return decodeURIComponent(escape(atob(str)));
        }

        function showStatus(msg, type) {
            const box = document.getElementById('statusMessage');
            box.innerText = msg;
            box.className = `status-box status-${type}`;
        }

        function convertData() {
            const inputData = document.getElementById('excelInput').value.trim();
            const type = document.getElementById('dataType').value;
            const outputEl = document.getElementById('jsonOutput');

            if (!inputData) {
                outputEl.textContent = '// Waiting for data...';
                currentParsedData = null;
                return;
            }

            const lines = inputData.split('\n');
            let jsonResult;

            if (type === 'adders') {
                jsonResult = [];
                lines.forEach(line => {
                    if (!line.trim()) return;
                    const cols = line.split('\t');
                    if (cols.length >= 2) jsonResult.push({ name: cols[0].trim(), cost: parseFloat(cols[1].replace(/[^0-9.-]+/g, "")) || 0 });
                });
            } else if (type === 'trim') {
                jsonResult = {};
                lines.forEach(line => {
                    if (!line.trim()) return;
                    const cols = line.split('\t');
                    if (cols.length >= 3) jsonResult[cols[0].trim()] = { width: parseFloat(cols[1].replace(/[^0-9.-]+/g, "")) || 0, pricePerStick: parseFloat(cols[2].replace(/[^0-9.-]+/g, "")) || 0 };
                });
            } else if (type === 'slabs') {
                jsonResult = {};
                lines.forEach(line => {
                    if (!line.trim()) return;
                    const cols = line.split('\t');
                    if (cols.length >= 8) {
                        const mat = cols[0].trim(), shape = cols[1].trim(), ht = cols[2].trim(), core = cols[3].trim(), wd = cols[4].trim();
                        const t1 = parseFloat(cols[5].replace(/[^0-9.-]+/g, "")) || 0, t2 = parseFloat(cols[6].replace(/[^0-9.-]+/g, "")) || 0, t3 = parseFloat(cols[7].replace(/[^0-9.-]+/g, "")) || 0;
                        if (!jsonResult[mat]) jsonResult[mat] = {};
                        if (mat === 'simpson' || mat === 'simpsonWhiteOak') {
                            if (!jsonResult[mat][shape]) jsonResult[mat][shape] = {};
                            if (!jsonResult[mat][shape][ht]) jsonResult[mat][shape][ht] = {};
                            if (!jsonResult[mat][shape][ht][core]) jsonResult[mat][shape][ht][core] = {};
                            jsonResult[mat][shape][ht][core][wd] = [t1, t2, t3];
                        } else {
                            if (!jsonResult[mat][ht]) jsonResult[mat][ht] = {};
                            if (!jsonResult[mat][ht][core]) jsonResult[mat][ht][core] = {};
                            jsonResult[mat][ht][core][wd] = [t1, t2, t3];
                        }
                    }
                });
            }

            currentParsedData = jsonResult;
            outputEl.textContent = JSON.stringify(jsonResult, null, 2);
        }

        async function pushToGitHub() {
            const token = document.getElementById('githubToken').value.trim();
            const type = document.getElementById('dataType').value;
            const btn = document.getElementById('pushBtn');

            if (!token) return showStatus("Error: Please enter your GitHub Personal Access Token.", "error");
            if (!currentParsedData) return showStatus("Error: No data to push. Please paste Excel data.", "error");

            btn.disabled = true;
            showStatus("1/3: Connecting to GitHub to fetch current database...", "loading");

            const apiUrl = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`;
            
            try {
                // Step 1: Get the current file from GitHub (We need its SHA hash to update it)
                const getResponse = await fetch(apiUrl, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!getResponse.ok) throw new Error("Could not find the pricing.json file in the repository. Check token scopes and repo name.");
                const getJson = await getResponse.json();
                
                showStatus("2/3: Merging your new data with the live database...", "loading");
                
                // Step 2: Decode the live JSON, update the specific category, and re-encode
                let liveDatabase = JSON.parse(decodeBase64(getJson.content));

                if (type === 'adders') liveDatabase.productionAdders = currentParsedData;
                if (type === 'trim') liveDatabase.trimPricingDB = currentParsedData;
                if (type === 'slabs') liveDatabase.pricingDB = currentParsedData;

                const newFileContent = encodeBase64(JSON.stringify(liveDatabase, null, 2));

                showStatus("3/3: Pushing update to the live server...", "loading");

                // Step 3: Put the updated file back to GitHub
                const putResponse = await fetch(apiUrl, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: `Admin Update: Modified ${type} pricing via Dashboard`,
                        content: newFileContent,
                        sha: getJson.sha // Required by GitHub to prove we are overwriting the latest version
                    })
                });

                if (!putResponse.ok) throw new Error("Failed to push the update. Ensure your token has 'repo' access.");

                showStatus("Success! Live pricing updated. Changes will reflect in the Configurator within 60 seconds.", "success");
                document.getElementById('excelInput').value = '';
                currentParsedData = null;
                document.getElementById('jsonOutput').textContent = '// Ready for next update...';

            } catch (error) {
                showStatus(error.message, "error");
                console.error(error);
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
