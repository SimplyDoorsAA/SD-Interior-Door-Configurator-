<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimplyDoors | Pricing Admin</title>
    <style>
        :root {
            --brand-bg: #0f172a; --brand-panel: #1e293b;
            --brand-primary: #059669; --brand-accent: #10b981;
            --text-main: #f8fafc; --text-muted: #94a3b8;
            --border-color: #334155; --danger: #ef4444;
        }

        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--brand-bg); color: var(--text-main); margin: 0; padding: 20px; line-height: 1.6; }
        .container { max-width: 1600px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--brand-primary); padding-bottom: 20px; margin-bottom: 30px; }
        h1 { margin: 0; font-size: 1.8rem; font-weight: 800; }
        h1 span { color: var(--brand-accent); }
        
        .grid { display: grid; grid-template-columns: 350px 1fr; gap: 30px; }
        @media (max-width: 1100px) { .grid { grid-template-columns: 1fr; } }

        .panel { background: var(--brand-panel); border: 1px solid var(--border-color); border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; margin-bottom: 20px; }
        .panel-header { background: rgba(0,0,0,0.2); padding: 15px 20px; font-weight: 700; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .control-group { padding: 15px 20px; border-bottom: 1px solid var(--border-color); }
        .control-group label { display: block; font-size: 0.85rem; font-weight: 700; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
        
        select, input[type="password"], input[type="text"], input[type="number"] { width: 100%; padding: 10px; background: var(--brand-bg); color: var(--text-main); border: 1px solid var(--border-color); border-radius: 6px; font-size: 1rem; outline: none; }
        select:focus, input:focus { border-color: var(--brand-primary); }
        
        /* Custom Checkbox for Remember Me */
        input[type="checkbox"] { width: auto; transform: scale(1.2); accent-color: var(--brand-primary); cursor: pointer; }

        .btn-primary { background: var(--brand-primary); color: white; border: none; padding: 12px 20px; border-radius: 6px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.2s; width: 100%; text-transform: uppercase;}
        .btn-primary:hover { background: var(--brand-accent); }
        .btn-primary:disabled { background: var(--border-color); color: var(--text-muted); cursor: not-allowed; }

        .btn-secondary { background: transparent; border: 1px solid var(--brand-primary); color: var(--brand-primary); padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-secondary:hover { background: var(--brand-primary); color: white; }

        .btn-danger { background: transparent; border: 1px solid var(--danger); color: var(--danger); padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        .btn-danger:hover { background: var(--danger); color: white; }

        .status-box { padding: 15px; margin: 20px 0; border-radius: 6px; display: none; font-weight: bold; text-align: center; font-size: 0.9rem; }
        .status-success { background: #dcfce7; color: #065f46; border: 1px solid #34d399; display: block; }
        .status-error { background: #fee2e2; color: #991b1b; border: 1px solid #f87171; display: block; }
        .status-loading { background: #fef08a; color: #854d0e; border: 1px solid #facc15; display: block; }

        .editor-container { padding: 20px; overflow-x: auto; max-height: 70vh; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th, td { border: 1px solid var(--border-color); padding: 8px; text-align: left; }
        th { background: rgba(0,0,0,0.3); color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; position: sticky; top: 0; z-index: 10; }
        td input { border: none; background: transparent; color: var(--text-main); font-family: monospace; width: 100%; padding: 5px; outline: none; }
        td input:focus { background: rgba(5, 150, 105, 0.15); }
        tr:hover { background: rgba(255,255,255,0.02); }
    </style>
</head>
<body>
    <div class="container">
        <header><h1>Simply<span>Doors</span> | Pricing Admin</h1></header>
        <div class="grid">
            <aside>
                <div class="panel">
                    <div class="panel-header">
                        <span>Connection</span>
                        <button id="logoutBtn" class="btn-danger" style="display:none; padding: 4px 8px; font-size: 0.75rem;" onclick="logout()">Disconnect</button>
                    </div>
                    <div class="control-group">
                        <label>GitHub PAT Token</label>
                        <input type="password" id="githubToken" placeholder="ghp_xxxxxxxx">
                        <div style="margin-top: 15px; display: flex; align-items: center; gap: 10px;">
                            <input type="checkbox" id="rememberMe">
                            <label for="rememberMe" style="margin: 0; display: inline-block; text-transform: none; color: var(--text-main); font-weight: normal; cursor: pointer;">Remember securely on this device</label>
                        </div>
                    </div>
                    <div class="control-group" style="border: none;">
                        <button class="btn-primary" id="fetchBtn" onclick="fetchLiveDatabase()">Fetch Live Data</button>
                    </div>
                </div>
                <div id="statusMessage" class="status-box"></div>
                <div class="panel" id="publishPanel" style="display: none;">
                    <div class="panel-header"><span>Publish Updates</span></div>
                    <div class="control-group">
                        <button class="btn-primary" id="pushBtn" onclick="pushToGitHub()">Publish Changes</button>
                    </div>
                </div>
            </aside>
            <main class="panel" id="editorPanel" style="opacity: 0.3; pointer-events: none;">
                <div class="panel-header">
                    <span>Editor</span>
                    <select id="dataType" onchange="renderTable()" style="padding: 5px; font-size: 0.9rem; width: auto; min-width: 300px;">
                        <option value="pricingDB">Door Slabs (Main DB)</option>
                        <option value="productionAdders">Production Adders & Labor</option>
                        <option value="trimPricingDB">Trim Pricing</option>
                        <option value="systemConstants">System Constants (Labor Rates, Jambs, etc)</option>
                    </select>
                </div>
                <div class="editor-container">
                    <table id="dataTable">
                        <thead id="tableHeader"></thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
                <div style="padding: 15px; display: flex; align-items: center;">
                    <button class="btn-secondary" onclick="addRow()">+ Add New Row</button>
                    <button id="seedAddersBtn" class="btn-secondary" style="display:none; margin-left:15px; border-color: var(--brand-accent); color: var(--brand-accent);" onclick="seedDefaultAdders()">✨ Auto-Fill Missing Adders</button>
                </div>
            </main>
        </div>
    </div>

    <script>
        const REPO_OWNER = "SimplyDoorsAA";
        const REPO_NAME = "SD-Interior-Door-Configurator-";
        const FILE_PATH = "data/pricing.json";
        let fullLiveDatabase = null;
        let currentFileSha = null;

        // Auto-Load Sequence
        document.addEventListener('DOMContentLoaded', () => {
            const savedToken = localStorage.getItem('sd_github_token');
            if (savedToken) {
                document.getElementById('githubToken').value = savedToken;
                document.getElementById('rememberMe').checked = true;
                fetchLiveDatabase(); // Seamless login
            }
        });

        function showStatus(msg, type) {
            const box = document.getElementById('statusMessage');
            box.innerText = msg; box.className = `status-box status-${type}`;
        }

        function logout() {
            localStorage.removeItem('sd_github_token');
            document.getElementById('githubToken').value = '';
            document.getElementById('rememberMe').checked = false;
            document.getElementById('logoutBtn').style.display = 'none';
            
            // Lock down UI
            document.getElementById('editorPanel').style.opacity = '0.3';
            document.getElementById('editorPanel').style.pointerEvents = 'none';
            document.getElementById('publishPanel').style.display = 'none';
            document.getElementById('tableHeader').innerHTML = '';
            document.getElementById('tableBody').innerHTML = '';
            showStatus("Disconnected. Please enter a token.", "error");
            fullLiveDatabase = null;
            currentFileSha = null;
        }

        async function fetchLiveDatabase() {
            const token = document.getElementById('githubToken').value.trim();
            if (!token) return showStatus("Token Required", "error");
            showStatus("Connecting...", "loading");
            try {
                const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`;
                const res = await fetch(url, { headers: { 'Authorization': `Bearer ${token}` } });
                if (!res.ok) throw new Error("Connection failed. Check your token.");
                
                // Connection successful: Handle Memory
                if (document.getElementById('rememberMe').checked) {
                    localStorage.setItem('sd_github_token', token);
                } else {
                    localStorage.removeItem('sd_github_token');
                }
                document.getElementById('logoutBtn').style.display = 'block';

                const data = await res.json();
                currentFileSha = data.sha;
                fullLiveDatabase = JSON.parse(decodeURIComponent(escape(atob(data.content))));
                
                document.getElementById('editorPanel').style.opacity = '1';
                document.getElementById('editorPanel').style.pointerEvents = 'auto';
                document.getElementById('publishPanel').style.display = 'block';
                showStatus("Data Loaded Successfully", "success");
                renderTable();
            } catch (e) { 
                showStatus(e.message, "error"); 
                document.getElementById('logoutBtn').style.display = 'none';
            }
        }

        function renderTable() {
            const type = document.getElementById('dataType').value;
            const head = document.getElementById('tableHeader');
            const body = document.getElementById('tableBody');
            head.innerHTML = ''; body.innerHTML = '';
            
            // Toggle Auto-Fill button visibility
            document.getElementById('seedAddersBtn').style.display = (type === 'productionAdders') ? 'inline-block' : 'none';

            let db = fullLiveDatabase[type];

            if (type === 'systemConstants') {
                head.innerHTML = `<tr><th>Constant Name (Code Key)</th><th>Value (Number)</th><th>Action</th></tr>`;
                if (!db || Object.keys(db).length === 0) {
                    fullLiveDatabase['systemConstants'] = {
                        "trimLaborCut": 7.00, "trimLaborApplied": 15.00,
                        "whiteOakJamb4": 94.10, "whiteOakJamb6": 126.90, "whiteOakHingeUpcharge": 12.98,
                        "doubleHardware68": 30.87, "doubleHardware80RHA": 42.13, "doubleHardware80LHA": 35.26,
                        "laborPointValueMinutes": 5.0, "laborTrimCut": 5.0, "laborTrimApplied": 10.0
                    };
                    db = fullLiveDatabase['systemConstants'];
                }
                for (let k in db) appendRow([k, db[k]]);
                
            } else if (type === 'productionAdders') {
                head.innerHTML = `<tr><th>Service Name</th><th>Cost ($)</th><th>Labor Points</th><th>Action</th></tr>`;
                if (db) db.forEach(a => appendRow([a.name, a.cost, a.points || 0]));
                
            } else if (type === 'trimPricingDB') {
                head.innerHTML = `<tr><th>Profile Name</th><th>Width (In)</th><th>Price / Stick ($)</th><th>Action</th></tr>`;
                if (db) for (let k in db) appendRow([k, db[k].width, db[k].pricePerStick]);
                
            } else if (type === 'pricingDB') {
                head.innerHTML = `<tr><th>Material</th><th>Shape</th><th>Height</th><th>Core</th><th>Width</th><th>Tier 1</th><th>Tier 2</th><th>Tier 3</th><th>Action</th></tr>`;
                if (db) {
                    for (let mat in db) {
                        if (mat.includes('simpson')) {
                            for (let sh in db[mat]) {
                                for (let ht in db[mat][sh]) {
                                    for (let cr in db[mat][sh][ht]) {
                                        for (let wd in db[mat][sh][ht][cr]) {
                                            let t = db[mat][sh][ht][cr][wd];
                                            appendRow([mat, sh, ht, cr, wd, t[0], t[1], t[2]]);
                                        }
                                    }
                                }
                            }
                        } else {
                            for (let ht in db[mat]) {
                                for (let cr in db[mat][ht]) {
                                    for (let wd in db[mat][ht][cr]) {
                                        let t = db[mat][ht][cr][wd];
                                        appendRow([mat, "", ht, cr, wd, t[0], t[1], t[2]]);
                                    }
                                }
                            }
                        }
                    }
                }
            }
        }

        function appendRow(vals) {
            const tr = document.createElement('tr');
            tr.innerHTML = vals.map(v => `<td><input type="text" value="${v}"></td>`).join('') + `<td><button class="btn-danger" onclick="this.parentElement.parentElement.remove()">X</button></td>`;
            document.getElementById('tableBody').appendChild(tr);
        }

        function addRow() {
            const type = document.getElementById('dataType').value;
            const count = type === 'systemConstants' ? 2 : (type === 'productionAdders' || type === 'trimPricingDB' ? 3 : 8);
            appendRow(Array(count).fill(""));
        }

        function seedDefaultAdders() {
            const defaults = [
                { name: "Prehang 6'8 Single (Std 4-9/16)", cost: 25.00, points: 15 },
                { name: "Prehang 8'0 Single (Std 4-9/16)", cost: 32.00, points: 20 },
                { name: "Upcharge to Interior 6-9/16 Jamb", cost: 20.00, points: 0 },
                { name: "Prehang 6'8 Double Ball Catch", cost: 55.00, points: 25 },
                { name: "Prehang 6'8 Double Flush Bolt", cost: 85.00, points: 35 },
                { name: "Prehang 8'0 Double Flush Bolt", cost: 95.00, points: 45 },
                { name: "Prehang 8'0 Double Ball Catch", cost: 50.00, points: 30 },
                { name: "Upcharge to Primed FJ Jamb", cost: 5.00, points: 0 },
                { name: "Slab Cutdown", cost: 10.00, points: 10 },
                { name: "Hinge Prep (Per Slab)", cost: 30.00, points: 15 },
                { name: "Bore Prep (Per Slab)", cost: 20.00, points: 5 }
            ];
            
            if (!fullLiveDatabase['productionAdders']) fullLiveDatabase['productionAdders'] = [];
            
            let addedCount = 0;
            defaults.forEach(def => {
                const exists = fullLiveDatabase['productionAdders'].find(a => a.name === def.name);
                if (!exists) {
                    fullLiveDatabase['productionAdders'].push(def);
                    addedCount++;
                }
            });
            
            if (addedCount > 0) {
                showStatus(`Added ${addedCount} missing adders! Click Publish to save them to the live database.`, "success");
                renderTable();
            } else {
                showStatus("All default adders are already present in the table.", "success");
            }
        }

        function collect() {
            const type = document.getElementById('dataType').value;
            const rows = document.querySelectorAll('#tableBody tr');
            
            if (type === 'systemConstants') {
                let obj = {};
                rows.forEach(r => {
                    const i = r.querySelectorAll('input');
                    if (i[0].value.trim()) obj[i[0].value.trim()] = parseFloat(i[1].value) || 0;
                });
                return obj;
            } else if (type === 'productionAdders') {
                return Array.from(rows).map(r => {
                    const i = r.querySelectorAll('input');
                    return { name: i[0].value, cost: parseFloat(i[1].value) || 0, points: parseFloat(i[2].value) || 0 };
                });
            } else if (type === 'trimPricingDB') {
                let obj = {};
                rows.forEach(r => {
                    const i = r.querySelectorAll('input');
                    if (i[0].value.trim()) obj[i[0].value.trim()] = { width: parseFloat(i[1].value) || 0, pricePerStick: parseFloat(i[2].value) || 0 };
                });
                return obj;
            } else {
                let obj = {};
                rows.forEach(r => {
                    const i = r.querySelectorAll('input');
                    const [mat, sh, ht, cr, wd, t1, t2, t3] = Array.from(i).map(x => x.value.trim());
                    if (!mat || !ht || !wd) return;
                    if (!obj[mat]) obj[mat] = {};
                    if (mat.includes('simpson')) {
                        if (!obj[mat][sh]) obj[mat][sh] = {};
                        if (!obj[mat][sh][ht]) obj[mat][sh][ht] = {};
                        if (!obj[mat][sh][ht][cr]) obj[mat][sh][ht][cr] = {};
                        obj[mat][sh][ht][cr][wd] = [parseFloat(t1)||0, parseFloat(t2)||0, parseFloat(t3)||0];
                    } else {
                        if (!obj[mat][ht]) obj[mat][ht] = {};
                        if (!obj[mat][ht][cr]) obj[mat][ht][cr] = {};
                        obj[mat][ht][cr][wd] = [parseFloat(t1)||0, parseFloat(t2)||0, parseFloat(t3)||0];
                    }
                });
                return obj;
            }
        }

        async function pushToGitHub() {
            const token = document.getElementById('githubToken').value;
            const type = document.getElementById('dataType').value;
            const btn = document.getElementById('pushBtn');
            btn.disabled = true; showStatus("Saving...", "loading");
            try {
                fullLiveDatabase[type] = collect();
                const content = btoa(unescape(encodeURIComponent(JSON.stringify(fullLiveDatabase, null, 2))));
                const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`;
                const res = await fetch(url, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: `Admin: Update ${type}`, content, sha: currentFileSha })
                });
                if (!res.ok) throw new Error("Push failed. Check repository permissions.");
                const result = await res.json();
                currentFileSha = result.content.sha;
                showStatus("Success! Live Pricing Updated.", "success");
            } catch (e) { showStatus(e.message, "error"); }
            btn.disabled = false;
        }
    </script>
</body>
</html>
